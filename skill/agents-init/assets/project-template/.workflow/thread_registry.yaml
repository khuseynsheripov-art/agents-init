protocol_version: 1
updated_at: "<update-on-use>"

main_thread:
  id: current
  source: placeholder
  role: main_agent_orchestrator
  generation: 1
  parent_main_id: ""
  pre_registration_packet: ""
  official_registration_packet: ""
  identity_status: pending_real_thread_id | registered | superseded | unknown
  takeover_reason: initial | user_requested | context_compression | system_error | gate_change | handoff | unknown
  manages_worktrees: false
  active_worktree_id: ""
  recovered_from_packet: ""
  authority_scope:
    - user_confirmation_gates
    - task_order
    - .workflow/current.yaml
    - .workflow/task.yaml
    - .workflow/open_threads.yaml
    - .workflow/verification.yaml
  owns:
    - user_confirmation_gates
    - task_order
    - .workflow/current.yaml
    - .workflow/task.yaml
    - .workflow/open_threads.yaml
    - .workflow/verification.yaml
  status: active
  history: []

workers: []
archived_workers: []
worktrees: []
branch_actors: []

receipt_template: .workflow/templates/worker_receipt.yaml

worker_lifecycle:
  allowed_lifecycle:
    - one_shot
    - continuous
  allowed_status:
    - proposed
    - registered
    - planned
    - dispatched
    - sent
    - active
    - running
    - waiting_receipt
    - no_output
    - interrupted
    - restarted
    - receipt_returned
    - completion_notice_returned
    - ready_for_main_review
    - receipt_accepted
    - receipt_rejected
    - revision_requested
    - parked_waiting_next_packet
    - merge_pending
    - merged
    - abandoned
    - archived
    - blocked
  allowed_transitions:
    proposed: [registered, blocked]
    registered: [planned, dispatched, sent, active, blocked, archived]
    planned: [dispatched, sent, active, blocked, archived]
    dispatched: [active, running, waiting_receipt, no_output, blocked]
    sent: [active, running, waiting_receipt, receipt_returned, no_output, blocked]
    active: [running, waiting_receipt, receipt_returned, completion_notice_returned, no_output, interrupted, blocked]
    running: [waiting_receipt, receipt_returned, completion_notice_returned, no_output, interrupted, blocked]
    waiting_receipt: [receipt_returned, completion_notice_returned, no_output, interrupted, blocked]
    no_output: [restarted, blocked, archived]
    interrupted: [restarted, blocked, archived]
    restarted: [sent, active, running, blocked]
    receipt_returned: [ready_for_main_review, receipt_accepted, receipt_rejected, blocked]
    completion_notice_returned: [ready_for_main_review, revision_requested, parked_waiting_next_packet, blocked]
    ready_for_main_review: [receipt_accepted, receipt_rejected, revision_requested, merge_pending, parked_waiting_next_packet, blocked]
    receipt_accepted: [parked_waiting_next_packet, merge_pending, archived]
    receipt_rejected: [registered, revision_requested, archived, blocked]
    revision_requested: [sent, active, running, blocked]
    parked_waiting_next_packet: [sent, active, archived, blocked]
    merge_pending: [merged, blocked, archived]
    merged: [archived]
    abandoned: [archived]
    blocked: [registered, archived]
    archived: []
  default_lifecycle: one_shot
  default_type: disposable_worker
  continuous_rule: "Only use continuous sessions for repeated role or MVP context; still require one receipt per bounded task."
  parked_rule: "parked_waiting_next_packet is a normal waiting state after a bounded branch task; it is not product acceptance, merge readiness, or failure."

rules:
  - Main agent decides product direction; workers do not.
  - Every worker gets one bounded question and one expected artifact.
  - Worker output must include evidence, open_threads, does_not_prove, and next.
  - Started workers or delegates are not analysis evidence until a raw receipt is returned and ingested.
  - no_output/interrupted/restarted records require close_reason and next_action before the main agent may count the task as handled.
  - Main agent must read receipts and update .workflow before continuing.
  - Codex App thread IDs may be added when thread tools are used.
  - Branch actors must not start the next bounded task without a new task_packet.
  - completion_notice is not acceptance; main-agent ingest and, when needed, chairman_brief are required before continuing.

