  positive_evidence:
    - source: ""
      proves:
        - ""
      does_not_prove:
        - ""
  negative_searches:
    - query: ""
      scope: ""
      result: no_hits | irrelevant_hits | blocked | not_run
      meaning: ""
  not_read_open_gap:
    - area: ""
      reason: too_large | inaccessible | binary | generated | irrelevant_noise | deferred | unknown
      risk_if_wrong: ""
      next_if_needed: ""
  confidence: exhaustive_for_scope | partial_continue | inconclusive | blocked
